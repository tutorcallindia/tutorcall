<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Student Courses</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f4f4f4;
    }

    .header {
      background: #4CAF50;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      max-width: 600px;
      margin: auto;
      padding: 20px;
    }

    .welcome {
      text-align: center;
      font-size: 18px;
      margin-bottom: 20px;
      font-weight: bold;
    }

    .course-card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
      box-shadow: 0 0 7px rgba(0,0,0,0.2);
      cursor: pointer;
      transition: 0.3s;
    }

    .course-card:hover {
      transform: translateY(-5px);
    }

    .title {
      font-size: 18px;
      font-weight: bold;
    }

    .detail {
      margin-top: 6px;
      color: #555;
      font-size: 14px;
    }

    .back {
      margin-top: 20px;
      display: block;
      text-align: center;
      font-size: 14px;
      color: #4CAF50;
    }
  </style>
</head>

<body>

<div class="header">My Courses</div>

<div class="container">

  <div class="welcome" id="welcomeBox">
    Welcome, Student
  </div>

  <!-- Course list -->
  <div id="courseList"></div>

  <a href="student-home.html" class="back">⬅ Back to Home</a>

</div>

<script>
// Token check
const token = localStorage.getItem("studentToken");
const studentInfo = localStorage.getItem("studentInfo");

if (!token || !studentInfo) {
  window.location.href = "student-login-test.html";
}

const student = JSON.parse(studentInfo);
document.getElementById("welcomeBox").innerHTML = `Welcome, ${student.name}`;


// Temporary demo courses (backend later)
const demoCourses = [
  {
    title: "Mathematics Basic Course",
    class: "Class 10",
    teacher: "Rahul Mishra",
    duration: "3 Months",
    progress: "40%"
  },
  {
    title: "Science Foundation",
    class: "Class 8",
    teacher: "Anjali Singh",
    duration: "4 Months",
    progress: "70%"
  },
  {
    title: "English Grammar Mastery",
    class: "Class 7",
    teacher: "Vivek Kumar",
    duration: "2 Months",
    progress: "20%"
  }
];


function loadCourses() {
  const courseBox = document.getElementById("courseList");

  if (demoCourses.length === 0) {
    courseBox.innerHTML = "<p>No courses enrolled.</p>";
    return;
  }

  courseBox.innerHTML = demoCourses.map(c =>
    `
    <div class="course-card">
      <div class="title">${c.title}</div>
      <div class="detail">Class: ${c.class}</div>
      <div class="detail">Teacher: ${c.teacher}</div>
      <div class="detail">Duration: ${c.duration}</div>
      <div class="detail">Progress: ${c.progress}</div>
    </div>
    `
  ).join("");
}

loadCourses();
</script>

</body>
</html>
