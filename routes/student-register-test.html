<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Registration</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 30px;
    }

    .container {
      width: 350px;
      background: white;
      padding: 25px;
      margin: auto;
      border-radius: 10px;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 12px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 18px;
      font-size: 16px;
      color: white;
      border: none;
      border-radius: 6px;
      background: #4CAF50;
      cursor: pointer;
    }

    button:hover {
      background: #45a049;
    }

    /* SUCCESS POPUP */
    #popupBackground {
      display:none;
      position: fixed;
      top:0; left:0;
      width:100%; height:100%;
      background: rgba(0,0,0,0.6);
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    #popupBox {
      background: white;
      padding: 25px;
      width: 300px;
      text-align: center;
      border-radius: 10px;
      animation: pop 0.4s ease-out;
    }

    @keyframes pop {
      0% { transform: scale(0.4); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    #nextBtn {
      background: #2196F3;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Student Registration</h2>

  <form id="regForm">
    <input type="text" id="name" placeholder="Full Name" required>
    <input type="text" id="phone" placeholder="Phone Number" required>
    <input type="email" id="email" placeholder="Email Address" required>
    <input type="password" id="password" placeholder="Password" required>
    <button type="submit">Register</button>
  </form>
</div>

<!-- POPUP -->
<div id="popupBackground">
  <div id="popupBox">
    <h3 style="color: green;">✔ Registration Successful</h3>
    <p>Redirecting to Dashboard...</p>

    <button id="nextBtn">Register Another Student</button>
  </div>
</div>

<script>
document.getElementById("regForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  try {

    // REGISTER
    const res = await fetch("https://tutorcall.co.in/api/students/register", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        name,
        phone,
        email,
        password
      })
    });

    const data = await res.json();

    if (!data.success) {
      alert(data.message || "Registration failed");
      return;
    }

    // FORM RESET
    document.getElementById("regForm").reset();

    // POPUP
    document.getElementById("popupBackground").style.display = "flex";

    // LOGIN
    const loginRes = await fetch("https://tutorcall.co.in/api/students/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        phone,
        password
      })
    });

    const loginData = await loginRes.json();

    if (loginData.success) {

      localStorage.setItem("studentToken", loginData.token);
      localStorage.setItem("studentInfo", JSON.stringify(loginData.student));

      setTimeout(() => {
        window.location.href = "/routes/student-dashboard.html";
      }, 1500);

    } else {

      setTimeout(() => {
        window.location.href = "/routes/student-login.html";
      }, 1500);

    }

  } catch (err) {

    console.error(err);
    alert("Server Error");

  }

});

document.getElementById("nextBtn").onclick = () => {
  document.getElementById("popupBackground").style.display = "none";
};
</script>

</body>
</html>
