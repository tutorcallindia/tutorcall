<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Find Tutor — Quick Form</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
 <style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;

}

body{

background:#fdf2f8;
padding:30px;
padding-top:40px;

}

.wrap{

max-width:950px;
margin:auto;

}

.card{

background:white;
padding:40px;
border-radius:30px;
backdrop-filter:blur(10px);
box-shadow:
0 15px 40px rgba(255,0,150,0.08);

border:1px solid #ffd3ea;

}

h1{

font-size:42px;
font-weight:800;

background:linear-gradient(
135deg,
#ff4fa3,
#7b5cff
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

margin-bottom:10px;

}

.sub{

font-size:17px;
color:#666;
margin-bottom:35px;

}

.grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(250px,1fr));

gap:22px;

}

label{

display:block;
margin-bottom:8px;

font-weight:600;
color:#111827;

}

input,
textarea,
select{

width:100%;

padding:15px;

border-radius:16px;

border:2px solid #ffd3ea;

font-size:15px;

background:#fff;

outline:none;

transition:0.3s;

}

input:focus,
textarea:focus,
select:focus{

border-color:#ff4fa3;

box-shadow:
0 0 0 4px rgba(255,79,163,0.12);

}

textarea{

resize:none;

}

.gps{

display:flex;
gap:10px;

}

.btn{

padding:14px 22px;

border:none;

border-radius:14px;

font-size:15px;
font-weight:700;

cursor:pointer;

transition:0.3s;

}

.btn-main{

background:linear-gradient(
135deg,
#ff4fa3,
#7b5cff
);

color:white;

}

.btn-main:hover{

transform:translateY(-2px);

box-shadow:
0 10px 20px rgba(123,92,255,0.25);

}

.btn-light{

background:white;

border:2px solid #ffd3ea;

color:#ff4fa3;

font-weight:700;

}

.btn-light:hover{

background:#fff0f7;

}



.button-row{

display:flex;
gap:12px;
margin-top:25px;

flex-wrap:wrap;

}

#status{

margin-top:15px;
font-size:14px;
color:#666;

}

@media(max-width:700px){

.card{

padding:25px;

}

h1{

font-size:32px;

}

}
/* ===============================
        TUTOR RESULTS
================================ */

#tutorResults{

margin-top:40px;

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(280px,1fr));

gap:25px;

}

/* TUTOR CARD */

.tutor-card{

background:white;

padding:22px;

border-radius:24px;

border:1px solid #ffd3ea;

box-shadow:
0 10px 25px rgba(255,0,140,0.08);

transition:0.3s;

}

.tutor-card:hover{

transform:translateY(-6px);

box-shadow:
0 18px 35px rgba(255,0,140,0.16);

}

.tutor-photo{

width:90px;
height:90px;

border-radius:50%;

object-fit:cover;

border:4px solid #ffd3ea;

margin-bottom:15px;

}

.tutor-name{

font-size:22px;

font-weight:700;

color:#111827;

margin-bottom:10px;

}

.tutor-info{

font-size:14px;

color:#555;

margin-top:6px;

line-height:1.5;

}

.tutor-fees{

margin-top:14px;

font-size:26px;

font-weight:800;

color:#ff1493;

}

.contact-btn{

width:100%;

margin-top:18px;

padding:14px;

border:none;

border-radius:14px;

background:linear-gradient(
135deg,
#ff4fa3,
#7b5cff
);

color:white;

font-weight:700;

cursor:pointer;

}

</style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Find Tutor — Short Form</h1>
      <p class="sub">Fill the details below. Current location can be auto-filled using your device GPS.</p>

      <form id="tutorForm" onsubmit="return handleSubmit(event)">
        <div class="grid">
          <div>
            <label for="name">Name</label>
            <input id="name" name="name" required placeholder="Full name" />
          </div>

          <div>
            <label for="father">Father Name</label>
            <input id="father" name="father" placeholder="Father / Guardian name" />
          </div>

          <div>
            <label for="age">Age</label>
            <input id="age" name="age" type="number" min="16" max="100" placeholder="Age" />
          </div>

          <div>
            <label for="dob">Date of Birth</label>
            <input id="dob" name="dob" type="date" />
          </div>

          <div>
            <label for="school">School</label>
            <input id="school" name="school" placeholder="School name (if any)" />
          </div>

          <div>
            <label for="class">Class</label>
            <input id="class" name="class" placeholder="Class (eg. 8, 10, 12)" />
          </div>

          <div>
            <label for="district">District</label>
            <input id="district" name="district" placeholder="District" />
          </div>

          <div>
            <label for="state">State</label>
            <input id="state" name="state" placeholder="State" />
          </div>
        </div>

        <label for="address">Full Address</label>
        <textarea id="address" name="address" placeholder="House no, street, area, landmark" rows="3"></textarea>

        <div class="grid">
          <div>
            <label for="email">Email</label>
            <input id="email" name="email" type="email" placeholder="your@email.com" />
          </div>

          <div>
            <label for="gps">Current Location (GPS Auto-Fill)</label>
            <div class="gps">
              <input id="gps" name="gps" readonly placeholder="Latitude, Longitude" />
              <button type="button"
class="btn btn-main"
onclick="fillGPS()">

Use GPS

</button>
            </div>
          </div>
        </div>

        <div class="button-row">

<button type="submit"
class="btn btn-main">

Submit Request

</button>

<button type="button"
class="btn btn-light"
onclick="resetForm()">

Reset

</button>

<div class="muted"
id="status">

</div>

</div>

      </form>
      <div id="tutorResults">

</div>
    </div>
  </div>

  <script>
    function fillGPS(){
      if(!navigator.geolocation){ alert('Geolocation not supported by this browser'); return; }
      const status = document.getElementById('status'); status.textContent = 'Getting location...';
      navigator.geolocation.getCurrentPosition(pos =>{
        const lat = pos.coords.latitude.toFixed(6);
        const lon = pos.coords.longitude.toFixed(6);
        document.getElementById('gps').value = lat + ', ' + lon;
        status.textContent = 'Location set';
      }, err =>{
        console.error(err);
        status.textContent = 'Unable to fetch location (permission denied or unavailable)';
      }, {timeout:10000});
    }

    async function handleSubmit(e){

  e.preventDefault();

  const data = {

    name: document.getElementById("name").value,
    father: document.getElementById("father").value,
    age: document.getElementById("age").value,
    dob: document.getElementById("dob").value,
    school: document.getElementById("school").value,
    className: document.getElementById("class").value,
    district: document.getElementById("district").value,
    state: document.getElementById("state").value,
    address: document.getElementById("address").value,
    email: document.getElementById("email").value,
    gps: document.getElementById("gps").value

  };

  try {

    const res = await fetch(
      "https://tutorcall.co.in/api/students/request",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
      }
    );

    const result = await res.json();

    alert(result.message);

    if(result.success){
      document.getElementById("tutorForm").reset();
    }

  } catch(err){

    console.log(err);

    alert("Server Error");

  }

  return false;
}
    function resetForm(){
      document.getElementById('tutorForm').reset();
      document.getElementById('gps').value = '';
      document.getElementById('status').textContent = '';
    }
    /* ===============================
      LOAD REAL TUTORS
================================ */

async function loadTutors(){

try{

const response =
await fetch(
"https://tutorcall.co.in/api/tutors/list"
);

const data =
await response.json();

const container =
document.getElementById(
"tutorResults"
);

container.innerHTML = "";

if(!data.tutors.length){

container.innerHTML = `

<h3>No tutors found</h3>

`;

return;

}

data.tutors.forEach(tutor=>{

container.innerHTML += `

<div class="tutor-card">

<img
src="${
 tutor.photo
 ? `https://tutorcall.co.in${tutor.photo}`
 : 'https://cdn-icons-png.flaticon.com/512/3177/3177440.png'
}"
class="tutor-photo"
>
<div class="tutor-name">

${tutor.name}

</div>

<div class="tutor-info">

📍 ${tutor.city}

</div>

<div class="tutor-info">

📘 ${tutor.subjects}

</div>

<div class="tutor-info">

🎓 ${tutor.classes}

</div>

<div class="tutor-info">

💻 ${tutor.mode}

</div>

<div class="tutor-info">

⭐ ${tutor.experience}

</div>

<div class="tutor-fees">

₹${tutor.fees}/month

</div>

<button class="contact-btn">

Contact Tutor

</button>

</div>

`;

});

}catch(error){

console.log(error);

}

}

loadTutors();
  </script>
</body>
</html>
