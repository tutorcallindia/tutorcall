<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Find Tutors</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f4f4f4;
    }

    .header {
      background: #2196f3;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
      max-width: 600px;
      margin: auto;
    }

    .field {
      margin-bottom: 15px;
    }

    label {
      font-size: 14px;
      font-weight: bold;
    }

    select, input {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #2196f3;
      color: white;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #1976d2;
    }

    .results {
      margin-top: 25px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
      box-shadow: 0px 0px 7px rgba(0,0,0,0.2);
    }

    .card-title {
      font-weight: bold;
      font-size: 18px;
    }

    .card-detail {
      font-size: 14px;
      color: #444;
      margin-top: 5px;
    }

    .back {
      margin-top: 20px;
      display: block;
      text-align: center;
      font-size: 14px;
      color: #2196f3;
    }
  </style>
</head>

<body>

<div class="header">Find Tutor</div>

<div class="container">

  <div class="field">
    <label>City</label>
    <input type="text" id="city" placeholder="Enter city (e.g., Gorakhpur)">
  </div>

  <div class="field">
    <label>Class</label>
    <select id="class">
      <option value="">Select Class</option>
      <option>Nursery</option>
      <option>KG</option>
      <option>Class 1</option>
      <option>Class 2</option>
      <option>Class 3</option>
      <option>Class 4</option>
      <option>Class 5</option>
      <option>Class 6</option>
      <option>Class 7</option>
      <option>Class 8</option>
      <option>Class 9</option>
      <option>Class 10</option>
      <option>Class 11</option>
      <option>Class 12</option>
      <option>NEET</option>
      <option>JEE</option>
    </select>
  </div>

  <div class="field">
    <label>Subject</label>
    <select id="subject">
      <option value="">Select Subject</option>
      <option>Maths</option>
      <option>Science</option>
      <option>English</option>
      <option>Hindi</option>
      <option>Computer</option>
      <option>Physics</option>
      <option>Chemistry</option>
      <option>Biology</option>
    </select>
  </div>

  <button onclick="searchTutor()">Search Tutor</button>

  <div class="results" id="results"></div>

  <a href="student-home.html" class="back">⬅ Back to Home</a>
</div>

<script>

// Temporary dummy data until backend ready
const dummyTutors = [
  { name: "Rahul Sharma", city: "Gorakhpur", subject: "Maths", class: "Class 10", exp: "3 years" },
  { name: "Anjali Singh", city: "Lucknow", subject: "Science", class: "Class 8", exp: "5 years" },
  { name: "Vivek Kumar", city: "Gorakhpur", subject: "English", class: "Class 7", exp: "2 years" },
  { name: "Ruchi Verma", city: "Delhi", subject: "Physics", class: "Class 11", exp: "4 years" }
];


function searchTutor() {
  const city = document.getElementById("city").value.toLowerCase();
  const cls = document.getElementById("class").value;
  const subject = document.getElementById("subject").value;

  const results = document.getElementById("results");
  results.innerHTML = "<b>Searching...</b>";

  setTimeout(() => {
    const filtered = dummyTutors.filter(tutor =>
      (city === "" || tutor.city.toLowerCase().includes(city)) &&
      (cls === "" || tutor.class === cls) &&
      (subject === "" || tutor.subject === subject)
    );

    if (filtered.length === 0) {
      results.innerHTML = "<p>No tutors found.</p>";
      return;
    }

    results.innerHTML = filtered.map(t =>
      `
        <div class="card">
          <div class="card-title">${t.name}</div>
          <div class="card-detail">City: ${t.city}</div>
          <div class="card-detail">Subject: ${t.subject}</div>
          <div class="card-detail">Class: ${t.class}</div>
          <div class="card-detail">Experience: ${t.exp}</div>
        </div>
      `
    ).join("");
  }, 500);
}

</script>

</body>
</html>
