<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Find Tutor | TutorCall</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f6f8fc;
}

header{
background:linear-gradient(90deg,#ff4fa3,#7b5cff);
padding:18px 40px;
display:flex;
justify-content:space-between;
align-items:center;
color:#fff;
}

.logo{
font-size:28px;
font-weight:700;
}

nav a{
color:#fff;
text-decoration:none;
margin-left:25px;
font-weight:500;
}

.hero{

padding:60px 20px;
text-align:center;
background:white;
}

.hero h1{

font-size:42px;
margin-bottom:10px;

}

.hero p{

color:#666;
margin-bottom:30px;

}

.search-box{

max-width:1100px;
margin:auto;
display:grid;
grid-template-columns:repeat(5,1fr);
gap:15px;

}

.search-box select,
.search-box input{

padding:14px;
border-radius:10px;
border:1px solid #ddd;
font-size:15px;

}

.search-btn{

background:#ff4fa3;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
font-weight:600;

}

.search-btn:hover{

background:#ff2d8a;

}

.container{

max-width:1200px;
margin:40px auto;
padding:20px;

}

#tutorResults{

display:grid;
grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
gap:25px;

}

.card{

background:white;
border-radius:18px;
padding:20px;
box-shadow:0 8px 25px rgba(0,0,0,.08);
transition:.3s;

}

.card:hover{

transform:translateY(-6px);

}

.photo{

width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
display:block;
margin:auto;

}

.name{

text-align:center;
font-size:22px;
font-weight:700;
margin-top:15px;

}

.info{

margin-top:15px;
line-height:28px;
color:#555;

}

.price{

font-size:28px;
font-weight:bold;
color:#ff4fa3;
text-align:center;
margin-top:15px;

}

.btns{

display:flex;
gap:10px;
margin-top:20px;

}

.btn{

flex:1;
padding:12px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:15px;
font-weight:600;

}

.profile{

background:#7b5cff;
color:white;

}

.book{

background:#ff4fa3;
color:white;

}

.lock{

margin-top:12px;
background:#fff3cd;
padding:10px;
border-radius:8px;
text-align:center;
font-size:14px;
color:#856404;

}

footer{

margin-top:60px;
padding:25px;
background:#222;
color:white;
text-align:center;

}

@media(max-width:900px){

.search-box{

grid-template-columns:1fr;

}

}

</style>

</head>

<body>

<header>

<div class="logo">

TutorCall

</div>

<nav>

<a href="/">Home</a>

<a href="/routes/student-dashboard.html">Dashboard</a>

<a href="#">Bookings</a>

<a href="#">Profile</a>

</nav>

</header>

<section class="hero">

<h1>Find Your Perfect Tutor</h1>

<p>

Search experienced Home & Online Tutors near you.

</p>

<div class="search-box">

<select id="class">

<option value="">Class</option>

<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
<option>11</option>
<option>12</option>

</select>

<input
id="subject"
placeholder="Subject">

<input
id="city"
placeholder="City">

<select id="mode">

<option value="">Mode</option>

<option>Home</option>

<option>Online</option>

</select>

<button
class="search-btn"
onclick="loadTutors()">

Search

</button>

</div>

</section>

<div class="container">

<div id="tutorResults">

Loading Tutors...

</div>

</div>

<footer>

© TutorCall 2026

</footer>

<script>

  async function loadTutors(){

try{

const cls=document.getElementById("class").value;
const subject=document.getElementById("subject").value;
const city=document.getElementById("city").value;
const mode=document.getElementById("mode").value;

let url="https://tutorcall.co.in/api/tutors/list?";

if(cls) url+="classes="+encodeURIComponent(cls)+"&";
if(subject) url+="subjects="+encodeURIComponent(subject)+"&";
if(city) url+="city="+encodeURIComponent(city)+"&";
if(mode) url+="mode="+encodeURIComponent(mode);

const res=await fetch(url);

const data=await res.json();

const box=document.getElementById("tutorResults");

box.innerHTML="";

if(!data.success || !data.tutors.length){

box.innerHTML=`
<div style="
background:white;
padding:40px;
border-radius:15px;
text-align:center;
grid-column:1/-1;
">
<h2>No Tutors Found</h2>
</div>
`;

return;

}

data.tutors.forEach(t=>{

box.innerHTML+=`

<div class="card">

<img class="photo"
src="${
t.photo
? "https://tutorcall.co.in"+t.photo
: "https://cdn-icons-png.flaticon.com/512/3177/3177440.png"
}">

<div class="name">

${t.name}

</div>

<div class="info">

<b>Qualification :</b> ${t.qualification||"N/A"}<br>

<b>Experience :</b> ${t.experience||"N/A"}<br>

<b>Subjects :</b> ${t.subjects||"N/A"}<br>

<b>Classes :</b> ${t.classes||"N/A"}<br>

<b>Mode :</b> ${t.mode||"N/A"}<br>

<b>City :</b> ${t.city||"N/A"}

</div>

<div class="price">

₹${t.fees||0}/Month

</div>

<div class="lock">

🔒 Contact details will be available after booking approval.

</div>

<div class="btns">

<button
class="btn profile"
onclick="viewProfile('${t._id}')">

View Profile

</button>

<button
class="btn book"
onclick="bookTutor('${t._id}')">

Book Tutor

</button>

</div>

</div>

`;

});

}catch(err){

console.log(err);

alert("Unable to load tutors");

}

}

function viewProfile(id){

alert("Tutor profile page coming soon.");

}
async function bookTutor(tutorId){

const token = localStorage.getItem("studentToken");

if(!token){

alert("Please Login First");

window.location.href="/routes/student-login.html";

return;

}

const schedule = prompt(
"Preferred Class Timing (Example: Evening 6 PM)"
);

if(schedule===null) return;

const message = prompt(
"Any message for tutor?"
) || "";

const amount = 0;

try{

const res = await fetch(
"https://tutorcall.co.in/api/booking/create",
{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+token
},
body:JSON.stringify({

tutorId,

schedule,

message,

amount

})
}
);

const data = await res.json();

if(data.success){

alert("Booking Request Sent Successfully.");

window.location.href=
"/routes/student-dashboard.html";

}else{

alert(data.message);

}

}catch(err){

console.log(err);

alert("Server Error");

}

}

// AUTO LOAD TUTORS
loadTutors();

</script>

</body>
</html>
