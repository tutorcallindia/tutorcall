<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Tutor Dashboard | TutorCall</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f5f7fb;
display:flex;
}

/* LEFT SIDEBAR */

.sidebar{

width:260px;
height:100vh;

background:linear-gradient(180deg,#ff4fa3,#7b5cff);

position:fixed;
left:0;
top:0;

padding:30px;

color:#fff;

}

.logo{

font-size:30px;
font-weight:700;
margin-bottom:45px;

}

.menu a{

display:block;

color:white;

text-decoration:none;

padding:14px 18px;

margin-bottom:12px;

border-radius:10px;

transition:.3s;

font-size:16px;

}

.menu a:hover{

background:rgba(255,255,255,.18);

}

/* RIGHT AREA */

.main{

margin-left:260px;

width:calc(100% - 260px);

padding:35px;

}

/* HEADER */

.header{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:30px;

}

.header h1{

font-size:34px;

}

.profile{

display:flex;

align-items:center;

gap:12px;

}

.profile img{

width:55px;

height:55px;

border-radius:50%;

object-fit:cover;

}

/* CARDS */

.cards{

display:grid;

grid-template-columns:repeat(4,1fr);

gap:20px;

margin-bottom:35px;

}

.card{

background:white;

padding:25px;

border-radius:18px;

box-shadow:0 8px 25px rgba(0,0,0,.08);

}

.card h3{

font-size:14px;

color:#777;

}

.card h2{

margin-top:12px;

font-size:34px;

color:#ff4fa3;

}

/* SECTION */

.section{

background:white;

padding:25px;

border-radius:18px;

box-shadow:0 8px 25px rgba(0,0,0,.08);

margin-bottom:30px;

}

.section h2{

margin-bottom:20px;

}

/* TABLE */

table{

width:100%;

border-collapse:collapse;

}

th{

background:#f4f5f9;

padding:14px;

text-align:left;

}

td{

padding:15px;

border-bottom:1px solid #eee;

}

/* BUTTON */

.btn{

padding:9px 15px;

border:none;

border-radius:8px;

cursor:pointer;

font-weight:600;

}

.accept{

background:#28a745;

color:white;

}

.reject{

background:#dc3545;

color:white;

}

@media(max-width:900px){

.sidebar{

display:none;

}

.main{

margin-left:0;

width:100%;

}

.cards{

grid-template-columns:1fr;

}

}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">

TutorCall

</div>

<div class="menu">

<a href="#">🏠 Dashboard</a>

<a href="#">📚 My Bookings</a>

<a href="#">👨‍🎓 Students</a>

<a href="#">⭐ Reviews</a>

<a href="#">💰 Earnings</a>

<a href="#">👤 Profile</a>

<a href="#">🚪 Logout</a>

</div>

</div>

<!-- MAIN -->

<div class="main">

<div class="header">

<h1>

Welcome Tutor 👋

</h1>

<div class="profile">

<img id="photo"
src="https://cdn-icons-png.flaticon.com/512/3177/3177440.png">

<div>

<b id="tutorName">

Tutor

</b>

<br>

<span id="tutorCity">

City

</span>

</div>

</div>

</div>

<!-- STATS -->

<div class="cards">

<div class="card">

<h3>

Pending Bookings

</h3>

<h2 id="pendingCount">

0

</h2>

</div>

<div class="card">

<h3>

Accepted

</h3>

<h2 id="acceptedCount">

0

</h2>

</div>

<div class="card">

<h3>

Completed

</h3>

<h2 id="completedCount">

0

</h2>

</div>

<div class="card">

<h3>

Monthly Earnings

</h3>

<h2>

₹0

</h2>

</div>

</div>

<!-- BOOKING TABLE -->

<div class="section">

<h2>

New Booking Requests

</h2>

<table>

<thead>

<tr>

<th>Student</th>

<th>Schedule</th>

<th>Message</th>

<th>Status</th>

<th>Action</th>

</tr>

</thead>

<tbody id="bookingTable">

<tr>

<td colspan="5">

Loading...

</td>

</tr>

</tbody>

</table>

</div>

<!-- REVIEW SECTION -->

<div class="section">

<h2>

Latest Reviews

</h2>

<div id="reviewBox">

No Reviews Yet

</div>

</div>

<script src="tutor-dashboard-v2.js"></script>

</body>

</html>
