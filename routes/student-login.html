<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Login</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      padding: 30px;
    }

    .container {
      width: 350px;
      background: white;
      padding: 25px;
      margin: auto;
      border-radius: 10px;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
    }

    h2 { text-align:center; }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 12px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 18px;
      font-size: 16px;
      color: white;
      border: none;
      border-radius: 6px;
      background: #2196F3;
      cursor: pointer;
    }

    button:hover { background: #1976D2; }

    .msg {
      margin-top: 10px;
      text-align: center;
      color: red;
      font-size: 14px;
    }

    .link {
      margin-top: 15px;
      text-align: center;
      font-size: 14px;
    }

    .link a {
      color: #2196F3;
      text-decoration: none;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Student Login</h2>

  <div class="msg" id="msg"></div>

  <form id="loginForm">
    <input type="text" id="phone" placeholder="Phone Number" required>
    <input type="password" id="password" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>

  <div class="link">
    <a href="student-register-test.html">New Student Register?</a>
  </div>
</div>

<script>
 if(localStorage.getItem("studentToken")){
  window.location.href =
  "/student-dashboard.html";
}
document.getElementById("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const phone = document.getElementById("phone").value;
  const password = document.getElementById("password").value;
  const msg = document.getElementById("msg");

  msg.innerHTML = "Checking...";

  try {

  const res = await fetch(
    "https://tutorcall.co.in/api/students/login",
    {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        phone,
        password
      })
    }
  );

  const data = await res.json();

  if (data.success) {

    msg.style.color = "green";

    msg.innerHTML =
    "Login successful. Redirecting...";

    localStorage.setItem(
      "studentToken",
      data.token
    );

    localStorage.setItem(
      "studentInfo",
      JSON.stringify(data.student)
    );

    localStorage.setItem(
      "studentId",
      data.student._id
    );

    setTimeout(() => {

      window.location.href =
      "student-dashboard.html";

    }, 1200);

  } else {

    msg.style.color = "red";

    msg.innerHTML =
    data.message;

  }

} catch(err){

  console.log(err);

  msg.style.color = "red";

  msg.innerHTML =
  "Server Error";

}
});
</script>

</body>
</html>
