<!DOCTYPE html>
<html>

<head>
  <title>Admin Login</title>

  <style>

    body{
      font-family:Arial;
      background:#eef2f3;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .box{
      width:350px;
      background:white;
      padding:25px;
      border-radius:12px;
      box-shadow:0 0 10px rgba(0,0,0,.1);
    }

    input{
      width:100%;
      padding:12px;
      margin-top:12px;
      border-radius:8px;
      border:1px solid #ccc;
    }

    button{
      width:100%;
      padding:12px;
      margin-top:18px;
      border:none;
      background:#007bff;
      color:white;
      border-radius:8px;
      cursor:pointer;
      font-size:16px;
    }

    h2{
      text-align:center;
    }

  </style>

</head>

<body>

<div class="box">

  <h2>Admin Login</h2>

  <input
    type="text"
    id="username"
    placeholder="Admin Username">

  <input
    type="password"
    id="password"
    placeholder="Password">

  <button onclick="loginAdmin()">
    Login
  </button>

</div>

<script>

async function loginAdmin(){

  const username =
    document.getElementById("username").value;

  const password =
    document.getElementById("password").value;

  try{

    const res = await fetch(
      "https://tutorcall.co.in/api/admin/login",
      {
        method:"POST",
        headers:{
          "Content-Type":"application/json"
        },
        body:JSON.stringify({
          username,
          password
        })
      }
    );

    const data = await res.json();

    if(data.success){

      localStorage.setItem(
        "adminToken",
        data.token
      );

      localStorage.setItem(
        "adminInfo",
        JSON.stringify(data.admin)
      );

      window.location.href =
      "/routes/admin-dashboard.html";

    }else{

      alert(data.message);

    }

  }catch(err){

    console.log(err);

    alert("Server Error");

  }

}

</script>

</body>
</html>
