<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Home</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial;
      background: #f4f4f4;
    }

    .header {
      background: #2196F3;
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .welcome {
      margin-top: 20px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      margin-top: 30px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 25px;
      text-align: center;
      border-radius: 10px;
      box-shadow: 0px 0px 8px rgba(0,0,0,0.2);
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .logout {
      width: 90%;
      margin: 20px auto;
      display: block;
      padding: 15px;
      text-align: center;
      background: #f44336;
      color: white;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
    }

    .logout:hover {
      background: #d32f2f;
    }
  </style>
</head>

<body>

<div class="header">Student Home</div>

<div class="welcome" id="welcomeText">Welcome Student</div>

<div class="container">
  <div class="card" onclick="openPage('student-profile.html')">My Profile</div>

  <!-- ⭐ UPDATED HERE ⭐ -->
  <div class="card" onclick="openPage('student-tutor-list.html')">Find Tutors</div>

  <div class="card" onclick="openPage('student-courses.html')">My Courses</div>
  <div class="card" onclick="openPage('student-bookings.html')">My Bookings</div>
  <div class="card" onclick="openPage('student-payments.html')">Payments</div>
  <div class="card" onclick="openPage('help-support.html')">Help & Support</div>
</div>

<div class="logout" onclick="logout()">Logout</div>

<script>
// TOKEN CHECK
const token = localStorage.getItem("studentToken");
const studentInfo = localStorage.getItem("studentInfo");

if (!token || !studentInfo) {
  window.location.href = "student-login-test.html";
}

const student = JSON.parse(studentInfo);

// Set welcome name
document.getElementById("welcomeText").innerHTML = `Welcome, ${student.name}!`;

// Page open function
function openPage(page) {
  window.location.href = page;
}

// Logout
function logout() {
  localStorage.removeItem("studentToken");
  localStorage.removeItem("studentInfo");
  window.location.href = "student-login-test.html";
}
</script>

</body>
</html>
