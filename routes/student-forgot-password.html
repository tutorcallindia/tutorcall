<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forgot Password</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      padding: 30px;
    }

    .container {
      width: 350px;
      background: white;
      padding: 25px;
      margin: auto;
      border-radius: 10px;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
    }

    h2 { text-align:center; }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 12px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 18px;
      font-size: 16px;
      color: white;
      border: none;
      border-radius: 6px;
      background: #ff9800;
      cursor: pointer;
    }

    button:hover { background: #fb8c00; }

    .msg {
      margin-top: 10px;
      text-align: center;
      color: red;
      font-size: 14px;
    }

    .link {
      margin-top: 15px;
      text-align: center;
      font-size: 14px;
    }

    .link a {
      color: #2196F3;
      text-decoration: none;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Reset Password</h2>

  <div class="msg" id="msg"></div>

  <form id="resetForm">
    <input type="text" id="phone" placeholder="Phone Number" required>
    <input type="password" id="newPassword" placeholder="New Password" required>
    <button type="submit">Update Password</button>
  </form>

  <div class="link">
    <a href="student-login-test.html">Back to Login</a>
  </div>
</div>

<script>
document.getElementById("resetForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const phone = document.getElementById("phone").value;
  const newPassword = document.getElementById("newPassword").value;
  const msg = document.getElementById("msg");

  msg.innerHTML = "Processing...";

  const res = await fetch("http://localhost:3000/student/reset-password", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ phone, newPassword })
  });

  const data = await res.json();

  if (data.success) {
    msg.style.color = "green";
    msg.innerHTML = "Password updated! Redirecting to login...";

    setTimeout(() => {
      window.location.href = "student-login-test.html";
    }, 1500);
  } else {
    msg.style.color = "red";
    msg.innerHTML = data.message;
  }
});
</script>

</body>
</html>
